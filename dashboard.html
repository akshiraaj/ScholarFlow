<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScholarFlow — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p class="loader-text">Waking up the system...</p>
  </div>

  <div class="bg-grid"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <h1>ScholarFlow</h1>
        <p class="tagline">Personal Workspace</p>
      </div>
      <button id="signout-btn">sign out</button>
    </div>
  </header>

  <main>
    <div class="left-col">
      <div class="island page-title">
        <h2 id="welcome-text">Hey there...</h2>
        <p id="sub-greeting">Let's see what's on the horizon.</p>
      </div>

      <div class="island stats-island">
        <div class="stat">
          <p class="stat-label">In Orbit</p>
          <p id="stat-total" class="stat-number">0</p>
        </div>
        <div class="stat">
          <p class="stat-label">To-Do</p>
          <p id="stat-pending" class="stat-number pending">0</p>
        </div>
        <div class="stat">
          <p class="stat-label">Finished</p>
          <p id="stat-done" class="stat-number done">0</p>
        </div>
      </div>

      <div class="island form-island">
        <p class="form-title">Log a New Task</p>
        <input id="f-subject" type="text" placeholder="Subject (e.g. Design)" />
        <input id="f-title" type="text" placeholder="What needs doing?" />
        <input id="f-date" type="date" />
        <select id="f-priority">
          <option value="">Set Priority</option>
          <option value="High">High Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="Low">Low Priority</option>
        </select>
        <button id="add-btn">add to list</button>
      </div>
    </div>

    <div class="island table-card">
      <div class="table-header">
        <span class="mono-label">Active Missions</span>
        <span id="table-count" class="mono-label dim">0 records</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Topic</th>
              <th>Mission</th>
              <th>Deadline</th>
              <th>Level</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="assignment-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOEb8cFTGdpQrIgjUjqQCGI4q1z96XIkA",
      authDomain: "scholarflow-28cf0.firebaseapp.com",
      projectId: "scholarflow-28cf0",
      storageBucket: "scholarflow-28cf0.firebasestorage.app",
      messagingSenderId: "126752346207",
      appId: "1:126752346207:web:92b8026906a4b97bfacbea"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        setHumanGreeting(user.displayName);
        loadAssignments(user.uid);
        setTimeout(() => {
          document.getElementById('loader').style.opacity = "0";
          setTimeout(() => document.getElementById('loader').style.display = "none", 500);
        }, 1200);
      } else { window.location.href = "auth.html"; }
    });

    function setHumanGreeting(name) {
      const hrs = new Date().getHours();
      let greet = "Hey";
      if (hrs < 12) greet = "Good morning";
      else if (hrs < 18) greet = "Good afternoon";
      else greet = "Good evening";
      document.getElementById('welcome-text').innerText = `${greet}, ${name || 'Scholar'}.`;
    }

    /* Rest of your Firestore Load/Add/Delete functions go here unchanged... */
    /* (I'm skipping them for brevity, but keep your existing logic!) */
  </script>
</body>
</html>

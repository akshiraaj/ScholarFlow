<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScholarFlow — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Quick inline fixes for the loader and island layout */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: #030208; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 9999; 
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); 
      border-top: 3px solid #4714ad; border-radius: 50%; animation: spin 1s linear infinite;
    }
    main {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 30px;
      padding: 0 5% 50px;
      align-items: start;
    }
    .left-col { display: flex; flex-direction: column; gap: 20px; }
    .island {
      background: rgba(18, 20, 50, 0.5);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(100, 150, 255, 0.15);
      border-radius: 24px;
      padding: 25px;
    }
    .row-done { opacity: 0.6; filter: grayscale(0.5); }
    .action-cell { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p style="color: white; margin-top: 20px; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; font-size: 0.8rem;">INITIALIZING INTERFACE...</p>
  </div>

  <div class="bg-grid"></div>

  <header style="padding: 20px 5%;">
    <div class="header-inner" style="display: flex; justify-content: space-between; align-items: center; background: rgba(18, 20, 50, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(100, 150, 255, 0.15); border-radius: 20px; padding: 15px 35px;">
      <div class="logo">
        <h1 style="margin: 0; font-size: 1.4rem; letter-spacing: 1px; color: #fff;">ScholarFlow</h1>
        <p class="tagline" style="margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #4714ad; text-transform: capitalize;">Dashboard</p>
      </div>
      <button id="signout-btn">Sign Out</button>
    </div>
  </header>

  <main>
    <div class="left-col">
      <div class="island page-title">
        <h2 id="welcome-text" style="margin: 0; font-size: 1.6rem;">Your Assignments</h2>
        <p style="color: #a0a0c0; font-size: 0.9rem;">Sorted by due date. Stay ahead.</p>
      </div>

      <div class="island stats-island" style="display: flex; justify-content: space-around; text-align: center;">
        <div class="stat">
          <p style="font-size: 0.7rem; color: #a0a0c0; text-transform: uppercase; margin: 0;">Total</p>
          <p id="stat-total" style="font-size: 1.5rem; font-weight: 700; margin: 5px 0 0;">0</p>
        </div>
        <div class="stat">
          <p style="font-size: 0.7rem; color: #a0a0c0; text-transform: uppercase; margin: 0;">Pending</p>
          <p id="stat-pending" style="font-size: 1.5rem; font-weight: 700; margin: 5px 0 0; color: #8a94ff;">0</p>
        </div>
        <div class="stat">
          <p style="font-size: 0.7rem; color: #a0a0c0; text-transform: uppercase; margin: 0;">Done</p>
          <p id="stat-done" style="font-size: 1.5rem; font-weight: 700; margin: 5px 0 0; color: #00ff9d;">0</p>
        </div>
      </div>

      <div class="island form-island">
        <p style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; margin-bottom: 15px; color: #8a94ff;">> NEW_TASK</p>
        <input id="f-subject" type="text" placeholder="Subject (e.g. Math)" />
        <input id="f-title" type="text" placeholder="Assignment title" />
        <input id="f-date" type="date" />
        <select id="f-priority">
          <option value="">Priority</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <button id="add-btn">+ Create Record</button>
      </div>
    </div>

    <div class="island table-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #a0a0c0;">Current Tasks</span>
        <span id="table-count" style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #4714ad;">0 total</span>
      </div>
      <div class="table-wrap" style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #8a94ff; border-bottom: 1px solid rgba(255,255,255,0.05);">
              <th style="padding-bottom: 15px;">Subject</th>
              <th style="padding-bottom: 15px;">Assignment</th>
              <th style="padding-bottom: 15px;">Due Date</th>
              <th style="padding-bottom: 15px;">Priority</th>
              <th style="padding-bottom: 15px;">Status</th>
              <th style="padding-bottom: 15px;"></th>
            </tr>
          </thead>
          <tbody id="assignment-tbody">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOEb8cFTGdpQrIgjUjqQCGI4q1z96XIkA",
      authDomain: "scholarflow-28cf0.firebaseapp.com",
      projectId: "scholarflow-28cf0",
      storageBucket: "scholarflow-28cf0.firebasestorage.app",
      messagingSenderId: "126752346207",
      appId: "1:126752346207:web:92b8026906a4b97bfacbea"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('welcome-text').innerText = `Welcome, ${user.displayName || 'Scholar'}`;
        loadAssignments(user.uid);
        
        setTimeout(() => {
          const loader = document.getElementById('loader');
          loader.style.opacity = "0";
          setTimeout(() => loader.style.display = "none", 500);
        }, 1200);
      } else {
        window.location.href = "auth.html";
      }
    });

    document.getElementById('signout-btn').onclick = () => {
      signOut(auth).then(() => window.location.href = "index.html");
    };

    function loadAssignments(uid) {
      const q = query(collection(db, "users", uid, "assignments"), orderBy("dueDate", "asc"));
      onSnapshot(q, (snapshot) => {
        const tbody = document.getElementById('assignment-tbody');
        tbody.innerHTML = "";

        if (snapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: #a0a0c0; padding: 60px 0; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">[ NO DATA FOUND ]</td></tr>`;
          updateStats(0, 0, 0);
          return;
        }

        let total = 0, pending = 0, done = 0;

        snapshot.forEach((docSnap) => {
          const a = docSnap.data();
          const id = docSnap.id;
          total++;
          a.status === "Done" ? done++ : pending++;

          const tr = document.createElement('tr');
          if (a.status === "Done") tr.classList.add('row-done');
          tr.style.borderBottom = "1px solid rgba(255,255,255,0.03)";

          tr.innerHTML = `
            <td style="padding: 15px 0; font-weight: 600;">${a.subject}</td>
            <td>${a.title}</td>
            <td style="font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;">${formatDate(a.dueDate)}</td>
            <td><span class="badge badge-${a.priority.toLowerCase()}">${a.priority}</span></td>
            <td><span class="status status-${a.status.toLowerCase()}">${a.status}</span></td>
            <td class="action-cell">
              <button class="complete-btn" data-id="${id}" data-status="${a.status}">✓</button>
              <button class="delete-btn" data-id="${id}">✕</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        updateStats(total, pending, done);
        document.getElementById('table-count').innerText = `${total} records`;

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.onclick = () => deleteAssignment(btn.dataset.id);
        });
        document.querySelectorAll('.complete-btn').forEach(btn => {
          btn.onclick = () => toggleComplete(btn.dataset.id, btn.dataset.status);
        });
      });
    }

    document.getElementById('add-btn').onclick = async () => {
      const subject = document.getElementById('f-subject').value.trim();
      const title = document.getElementById('f-title').value.trim();
      const dueDate = document.getElementById('f-date').value;
      const priority = document.getElementById('f-priority').value;

      if (!subject || !title || !dueDate || !priority) return alert("All fields required.");

      await addDoc(collection(db, "users", currentUser.uid, "assignments"), {
        subject, title, dueDate, priority, status: "Pending"
      });

      ["f-subject", "f-title", "f-date", "f-priority"].forEach(id => document.getElementById(id).value = "");
    };

    async function deleteAssignment(id) {
      if(confirm("Permanently delete record?")) {
        await deleteDoc(doc(db, "users", currentUser.uid, "assignments", id));
      }
    }

    async function toggleComplete(id, currentStatus) {
      const newStatus = currentStatus === "Done" ? "Pending" : "Done";
      await updateDoc(doc(db, "users", currentUser.uid, "assignments", id), { status: newStatus });
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split("-");
      const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
      return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
    }

    function updateStats(t, p, d) {
      document.getElementById('stat-total').innerText = t;
      document.getElementById('stat-pending').innerText = p;
      document.getElementById('stat-done').innerText = d;
    }
  </script>
</body>
</html>

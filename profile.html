<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><polygon points='16,4 28,10 16,16 4,10' fill='%232563EB'/><rect x='4' y='16' width='24' height='3' fill='%231E3A5F'/><line x1='28' y1='10' x2='28' y2='24' stroke='%2360A5FA' stroke-width='2' stroke-linecap='round'/><circle cx='28' cy='26' r='2' fill='%2360A5FA'/></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScholarFlow — Profile</title>
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .profile-page { max-width: 600px; margin: 0 auto; padding: 40px 40px 80px; position: relative; z-index: 1; }
    .profile-hero { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
    .profile-avatar-big {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--blue); color: white;
      font-size: 24px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      border: 2px solid rgba(37,99,235,0.3);
    }
    .profile-hero-name { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.03em; margin-bottom: 4px; }
    .profile-hero-email { font-size: 13px; color: var(--muted); }
    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px; margin-bottom: 16px;
    }
    .profile-card-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .profile-stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .p-stat { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; }
    .p-stat-val { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .p-stat-label { font-size: 11px; color: var(--muted); }
    .profile-field { margin-bottom: 14px; }
    .profile-field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .profile-field input {
      width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; outline: none; transition: 0.2s;
    }
    .profile-field input:focus { border-color: var(--blue); background: rgba(37,99,235,0.05); }
    .profile-field input::placeholder { color: #2d3f54; }
    .save-btn {
      background: var(--blue); border: none; border-radius: 8px;
      padding: 11px 24px; color: white;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
    }
    .save-btn:hover { opacity: 0.85; }
    .save-btn:active { transform: scale(0.98); }
    .theme-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
    .theme-label { font-size: 13px; color: var(--text); }
    .toggle {
      width: 36px; height: 20px; background: rgba(255,255,255,0.1);
      border-radius: 999px; position: relative; cursor: pointer; transition: background 0.2s;
    }
    .toggle.on { background: var(--blue); }
    .toggle-knob {
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: white; transition: transform 0.2s;
    }
    .signout-btn {
      width: 100%; background: rgba(244,63,94,0.08);
      border: 1px solid rgba(244,63,94,0.15);
      border-radius: 10px; padding: 13px; color: #f87171;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .signout-btn:hover { opacity: 0.7; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--border); padding: 7px 14px;
      border-radius: 7px; transition: 0.2s; margin-bottom: 28px;
    }
    .back-link:hover { color: var(--text); border-color: rgba(37,99,235,0.3); }
    .save-confirm { font-size: 12px; color: #34d399; margin-top: 8px; opacity: 0; transition: opacity 0.3s; }
    .save-confirm.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="bg-grid"></div>

  <div id="loader">
    <div class="spinner"></div>
    <p class="loader-text">Loading you in...</p>
  </div>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo-link">
        <svg width="185" height="22" viewBox="0 0 260 40" style="display:block;" xmlns="http://www.w3.org/2000/svg">
          <polygon points="16,8 28,14 16,20 4,14" fill="#2563EB" opacity="0.9"/>
          <rect x="4" y="20" width="24" height="3" rx="0" fill="#1E3A5F"/>
          <line x1="28" y1="14" x2="28" y2="28" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="28" cy="30" r="2" fill="#60A5FA"/>
          <text x="42" y="26" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="18" fill="#F0F6FF" letter-spacing="-0.03em">ScholarFlow</text>
        </svg>
      </a>
      <div class="nav-right">
        <a href="dashboard.html" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:7px 14px;border-radius:7px;transition:0.2s;" onmouseover="this.style.color='#F0F6FF'" onmouseout="this.style.color='var(--muted)'">← Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="profile-page">

    <a href="dashboard.html" class="back-link">← Back to dashboard</a>

    <!-- HERO -->
    <div class="profile-hero">
      <div class="profile-avatar-big" id="profile-avatar">S</div>
      <div>
        <p class="profile-hero-name" id="profile-hero-name">Scholar</p>
        <p class="profile-hero-email" id="profile-hero-email"></p>
      </div>
    </div>

    <!-- STATS -->
    <div class="profile-card">
      <p class="profile-card-title">Your stats</p>
      <div class="profile-stats-grid">
        <div class="p-stat"><p class="p-stat-val" id="p-total">0</p><p class="p-stat-label">Total assignments</p></div>
        <div class="p-stat"><p class="p-stat-val" style="color:#34d399" id="p-done">0</p><p class="p-stat-label">Completed</p></div>
        <div class="p-stat"><p class="p-stat-val" style="color:#60A5FA" id="p-subjects">0</p><p class="p-stat-label">Subjects</p></div>
      </div>
    </div>

    <!-- EDIT NAME -->
    <div class="profile-card">
      <p class="profile-card-title">Edit profile</p>
      <div class="profile-field">
        <label>Display name</label>
        <input id="display-name-input" type="text" placeholder="Your name"/>
      </div>
      <button class="save-btn" id="save-name-btn">Save changes</button>
      <p class="save-confirm" id="save-confirm">✓ Saved!</p>
    </div>

    <!-- PREFERENCES -->
    <div class="profile-card">
      <p class="profile-card-title">Preferences</p>
      <div class="theme-row">
        <span class="theme-label">Dark mode</span>
        <div class="toggle on" id="theme-toggle" onclick="toggleTheme()">
          <div class="toggle-knob" id="theme-knob"></div>
        </div>
      </div>
    </div>

    <!-- SIGN OUT -->
    <div class="profile-card">
      <p class="profile-card-title">Account</p>
      <button class="signout-btn" id="signout-btn">Sign Out</button>
    </div>

  </div>

  <script>
    let isDark = true;
    function toggleTheme() {
      isDark = !isDark;
      document.getElementById('theme-knob').style.transform = isDark ? 'translateX(0)' : 'translateX(16px)';
      document.getElementById('theme-toggle').classList.toggle('on', isDark);
      document.body.style.filter = isDark ? '' : 'invert(1) hue-rotate(180deg)';
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOEb8cFTGdpQrIgjUjqQCGI4q1z96XIkA",
      authDomain: "scholarflow-28cf0.firebaseapp.com",
      projectId: "scholarflow-28cf0",
      storageBucket: "scholarflow-28cf0.firebasestorage.app",
      messagingSenderId: "126752346207",
      appId: "1:126752346207:web:92b8026906a4b97bfacbea"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const name     = user.displayName || 'Scholar';
        const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);

        document.getElementById('profile-avatar').innerText    = initials;
        document.getElementById('profile-hero-name').innerText = name;
        document.getElementById('profile-hero-email').innerText = user.email || '';
        document.getElementById('display-name-input').value    = name;

        // load assignment stats
        onSnapshot(collection(db, "users", user.uid, "assignments"), (snap) => {
          const assignments = snap.docs.map(d => d.data());
          document.getElementById('p-total').innerText = assignments.length;
          document.getElementById('p-done').innerText  = assignments.filter(a => a.status === 'Done').length;
        });

        // load subject count
        onSnapshot(collection(db, "users", user.uid, "subjects"), (snap) => {
          document.getElementById('p-subjects').innerText = snap.size;
        });

        setTimeout(() => {
          const loader = document.getElementById('loader');
          loader.style.opacity = "0";
          setTimeout(() => loader.style.display = "none", 500);
        }, 800);
      } else {
        window.location.href = "auth.html";
      }
    });

    document.getElementById('save-name-btn').onclick = async () => {
      const newName = document.getElementById('display-name-input').value.trim();
      if (!newName || !auth.currentUser) return;
      await updateProfile(auth.currentUser, { displayName: newName });
      const initials = newName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('profile-avatar').innerText    = initials;
      document.getElementById('profile-hero-name').innerText = newName;
      const confirm = document.getElementById('save-confirm');
      confirm.classList.add('show');
      setTimeout(() => confirm.classList.remove('show'), 2000);
    };

    document.getElementById('signout-btn').onclick = () => {
      signOut(auth).then(() => window.location.href = "index.html");
    };
  </script>

</body>
</html>
